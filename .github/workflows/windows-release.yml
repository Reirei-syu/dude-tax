name: windows-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows package
        run: npm run package:win

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        run: npm run package:installer

      - name: Publish versioned release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $installer = "dist-electron/installer/dude-tax-installer-x64.exe"
          $isPreRelease = $tag.Contains("alpha") -or $tag.Contains("beta") -or $tag.Contains("rc")
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            if ($isPreRelease) {
              gh release create $tag $installer --title $tag --notes "Automated Windows installer release." --prerelease
            } else {
              gh release create $tag $installer --title $tag --notes "Automated Windows installer release."
            }
          } else {
            gh release upload $tag $installer --clobber
          }

      - name: Publish rolling latest installer asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $rollingTag = "installer-latest"
          $installer = "dist-electron/installer/dude-tax-installer-x64.exe"
          gh release view $rollingTag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $rollingTag $installer --title "Latest Installer" --notes "Stable URL for the latest Windows installer."
          } else {
            gh release upload $rollingTag $installer --clobber
          }
